<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — mdothree.com</title>
  <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#10B981" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --emerald: #10B981; --slate-900: #0F172A; --slate-500: #64748B;
      --slate-300: #CBD5E1; --white: #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white); color: var(--slate-900);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px; text-align: center;
    }
    .wrap { max-width: 480px; }
    .code {
      font-family: 'DM Mono', monospace; font-size: 6rem; font-weight: 500;
      color: var(--emerald); line-height: 1; margin-bottom: 16px;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 12px;
    }
    p { font-size: 0.95rem; color: var(--slate-500); margin-bottom: 32px; line-height: 1.6; }
    a.btn {
      display: inline-block; padding: 12px 28px;
      background: var(--emerald); color: #fff; text-decoration: none;
      border-radius: 8px; font-weight: 600; font-size: 0.9rem;
      transition: background 150ms;
    }
    a.btn:hover { background: #059669; }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
      color: var(--slate-900); text-decoration: none; display: block;
      margin-bottom: 48px; letter-spacing: -0.02em;
    }
    .logo span { color: var(--emerald); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="logo" href="/">m<span>.</span>3</a>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved.</p>
    <a class="btn" href="/">← Back to home</a>
  </div>
</body>
</html>
